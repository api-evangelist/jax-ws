aid: jax-ws
name: JAX-WS
description: >-
  JAX-WS (Java API for XML Web Services) is a Java standard for building and
  consuming SOAP-based XML web services. Originally specified as JSR 224 under
  the Java Community Process, JAX-WS is now part of Jakarta EE as Jakarta XML
  Web Services. It defines annotations and runtime APIs that allow developers
  to expose Java methods as SOAP web service operations and to generate Java
  client stubs from WSDL documents. Reference implementations include the
  Eclipse Metro project and Apache CXF.
